<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Trend Cart BD</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#f5f7fb;
font-family:Poppins,sans-serif;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.search{
width:350px;
padding:14px;
border:none;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px 8%;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 12px 30px rgba(0,0,0,.08);
transition:.35s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.info{
padding:18px;
}

.price{
font-size:24px;
font-weight:700;
color:#0b3ea9;
}

.old{
text-decoration:line-through;
color:#888;
margin-left:10px;
}

button{
width:100%;
padding:14px;
border:none;
background:#0b3ea9;
color:white;
border-radius:12px;
cursor:pointer;
margin-top:15px;
font-size:16px;
}

button:hover{
background:#ff6b00;
}

.badge{
position:absolute;
background:#ff3b30;
color:#fff;
padding:8px 15px;
border-radius:30px;
margin:15px;
font-size:13px;
font-weight:700;
}

.wrap{
position:relative;
}

</style>

</head>

<body>

<div class="top">

<h1>🛍 Shop</h1>

<input
type="text"
class="search"
id="search"
placeholder="Search Product...">

</div>

<div class="grid" id="products"></div>

<script>

const items=[

{
id:1,
name:"Portable Blender",
price:1290,
old:1690,
image:"https://picsum.photos/400/300?1"
},

{
id:2,
name:"Mini Fan",
price:990,
old:1290,
image:"https://picsum.photos/400/300?2"
},

{
id:3,
name:"LED Light",
price:790,
old:1090,
image:"https://picsum.photos/400/300?3"
},

{
id:4,
name:"Phone Holder",
price:490,
old:690,
image:"https://picsum.photos/400/300?4"
},

{
id:5,
name:"Neck Massager",
price:1490,
old:1990,
image:"https://picsum.photos/400/300?5"
},

{
id:6,
name:"Vacuum Cleaner",
price:2290,
old:2790,
image:"https://picsum.photos/400/300?6"
}

];

const box=document.getElementById("products");

function load(data){

box.innerHTML="";

data.forEach(p=>{

box.innerHTML+=`

<div class="card">

<div class="wrap">

<div class="badge">

HOT

</div>

<img src="${p.image}">

</div>

<div class="info">

<h3>${p.name}</h3>

<p>

<span class="price">৳${p.price}</span>

<span class="old">৳${p.old}</span>

</p>

<button onclick="add('${p.name}')">

🛒 Add To Cart

</button>

</div>

</div>

`;

});

}

load(items);

document.getElementById("search").onkeyup=e=>{

const value=e.target.value.toLowerCase();

load(items.filter(p=>

p.name.toLowerCase().includes(value)

));

}

function add(name){

alert(name+" Added Successfully");

}

</script>

</body>
</html>
