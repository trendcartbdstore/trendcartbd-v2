<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | Trend Cart BD</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
background:#f5f7fb;
font-family:Poppins,sans-serif;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
}

.main-image img{
width:100%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.thumbs{
display:flex;
gap:10px;
margin-top:15px;
}

.thumbs img{
width:80px;
height:80px;
border-radius:10px;
cursor:pointer;
object-fit:cover;
border:2px solid transparent;
}

.thumbs img:hover{
border-color:#0b3ea9;
}

.price{
font-size:32px;
color:#0b3ea9;
font-weight:700;
}

.old{
text-decoration:line-through;
color:#888;
margin-left:10px;
}

button{
padding:15px 30px;
margin-top:20px;
background:#0b3ea9;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-size:18px;
}

button:hover{
background:#ff6b00;
}

.review{
margin-top:40px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.star{
color:gold;
font-size:22px;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<div>

<div class="main-image">
<img id="mainImg" src="https://picsum.photos/600/500?1">
</div>

<div class="thumbs">

<img src="https://picsum.photos/600/500?1" onclick="change(this.src)">
<img src="https://picsum.photos/600/500?2" onclick="change(this.src)">
<img src="https://picsum.photos/600/500?3" onclick="change(this.src)">
<img src="https://picsum.photos/600/500?4" onclick="change(this.src)">

</div>

</div>

<div>

<h1>Portable Blender</h1>

<p class="price">
৳1290
<span class="old">৳1690</span>
</p>

<p>
Premium Portable Blender for Home & Travel.
USB Rechargeable | High Speed | Food Grade Material.
</p>

<button>🛒 Add To Cart</button>

<button style="background:#25D366">
💬 Order on WhatsApp
</button>

<div class="review">

<h2>Customer Reviews</h2>

<p class="star">★★★★★</p>

<p>
Very good quality. Fast delivery. Highly recommended.
</p>

</div>

</div>

</div>

<script>
function change(src){
document.getElementById("mainImg").src=src;
}
</script>

</body>
</html>
