<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | Trend Cart BD</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
max-width:1200px;
margin:50px auto;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.cart-item img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}

.qty button{
width:35px;
height:35px;
border:none;
cursor:pointer;
background:#0b3ea9;
color:#fff;
border-radius:8px;
}

.remove{
background:red;
color:#fff;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.total{
text-align:right;
font-size:30px;
font-weight:bold;
margin-top:30px;
}

.checkout{
display:inline-block;
margin-top:20px;
padding:15px 35px;
background:#ff6b00;
color:#fff;
border-radius:12px;
font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div id="cartItems"></div>

<div class="total">

Total : ৳ <span id="total">0</span>

</div>

<a href="checkout.html" class="checkout">

Proceed Checkout

</a>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("trendcart"))||[];

const cartItems=document.getElementById("cartItems");

const total=document.getElementById("total");

function loadCart(){

cartItems.innerHTML="";

let grand=0;

cart.forEach((item,index)=>{

grand+=item.price*item.qty;

cartItems.innerHTML+=`

<div class="cart-item">

<img src="${item.image}">

<div>

<h3>${item.name}</h3>

<p>৳${item.price}</p>

</div>

<div class="qty">

<button onclick="minus(${index})">-</button>

<span>${item.qty}</span>

<button onclick="plus(${index})">+</button>

</div>

<button class="remove"

onclick="removeItem(${index})">

Delete

</button>

</div>

`;

});

total.innerHTML=grand;

localStorage.setItem("trendcart",JSON.stringify(cart));

}

function plus(i){

cart[i].qty++;

loadCart();

}

function minus(i){

if(cart[i].qty>1){

cart[i].qty--;

}

loadCart();

}

function removeItem(i){

cart.splice(i,1);

loadCart();

}

loadCart();

</script>

</body>
</html>
