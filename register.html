<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Register | Trend Cart BD</title>

<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/fonts.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/mobile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">

Trend<span>Cart</span> BD

</a>

</div>

</header>

<section class="products">

<div class="container">

<div class="card"

style="max-width:650px;margin:auto;padding:35px;">

<h2 style="text-align:center;margin-bottom:30px;">

Create Your Account

</h2>

<input

id="fullName"

class="input"

type="text"

placeholder="Full Name">

<br><br>

<input

id="email"

class="input"

type="email"

placeholder="Email Address">

<br><br>

<input

id="phone"

class="input"

type="tel"

placeholder="Phone Number">

<br><br>

<input

id="password"

class="input"

type="password"

placeholder="Password">

<br><br>

<input

id="confirmPassword"

class="input"

type="password"

placeholder="Confirm Password">

<br><br>

<input

id="referral"

class="input"

type="text"

placeholder="Referral / Affiliate Code (Optional)">

<br><br>

<label>

<input id="agree" type="checkbox">

I Agree With Terms & Privacy Policy

</label>

<br><br>

<button

id="registerBtn"

class="btn"

style="width:100%;">

Create Account

</button>

<br><br>

<p style="text-align:center;">

Already Have An Account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

</section>

<footer class="footer">

<div class="container">

<div class="footer-bottom">

© 2026 Trend Cart BD

</div>

</div>

</footer>

<script src="assets/js/register.js"></script>

</body>

</html>
