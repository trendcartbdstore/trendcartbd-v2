<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Checkout | Trend Cart BD</title>

<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/fonts.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/mobile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">

Trend<span>Cart</span> BD

</a>

</div>

</header>

<section class="products">

<div class="container">

<div class="section-title">

<h2>Checkout</h2>

</div>

<div style="display:grid;grid-template-columns:2fr 1fr;gap:25px;">

<!-- CUSTOMER -->

<div class="card" style="padding:25px;">

<h3>Customer Information</h3>

<br>

<input id="name" type="text" placeholder="Full Name" class="input">

<br><br>

<input id="phone" type="tel" placeholder="Phone Number" class="input">

<br><br>

<textarea id="address" placeholder="Delivery Address" class="input" rows="4"></textarea>

<br><br>

<select id="payment" class="input">

<option value="COD">Cash On Delivery</option>

<option value="bKash">bKash</option>

<option value="Nagad">Nagad</option>

<option value="Rocket">Rocket</option>

</select>

<br><br>

<button id="placeOrder" class="btn">

Place Order

</button>

</div>

<!-- ORDER SUMMARY -->

<div class="card" style="padding:25px;">

<h3>Order Summary</h3>

<hr><br>

<div id="checkoutItems">

</div>

<hr><br>

<h2>

Total :

<span id="checkoutTotal">

৳0

</span>

</h2>

</div>

</div>

</div>

</section>

<footer class="footer">

<div class="container">

<div class="footer-bottom">

© 2026 Trend Cart BD

</div>

</div>

</footer>

<script src="assets/js/checkout.js"></script>

</body>

</html>
